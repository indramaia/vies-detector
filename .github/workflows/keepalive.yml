name: Keep-alive — Render + Neon

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos (mínimo do GitHub Actions)
  workflow_dispatch:         # permite disparar manualmente para teste

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /api/warmup
        run: |
          # Render free tier pode retornar 503 durante cold start (~30-60s).
          # Tenta até 3 vezes com 40s de espera entre tentativas antes de falhar.
          for attempt in 1 2 3; do
            HTTP=$(curl -s -o /tmp/body.json -w "%{http_code}" \
              --max-time 40 \
              https://vies-detector.onrender.com/api/warmup)

            echo "Tentativa $attempt — HTTP $HTTP"
            cat /tmp/body.json

            if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
              echo "OK"
              exit 0
            fi

            [ $attempt -lt 3 ] && sleep 40
          done

          echo "ERRO: API não respondeu após 3 tentativas"
          exit 1
