name: Pipeline - Coleta e Classificação

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas
  workflow_dispatch:          # permite rodar manualmente

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar modelo do HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os, sys
          token = os.environ.get('HF_TOKEN', '')
          if not token:
              print('ERRO: HF_TOKEN nao configurado nos secrets do GitHub')
              sys.exit(1)
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='IndraSeixas/bertimbau-bias',
              local_dir='models/bertimbau-bias',
              token=token,
          )
          print('Modelo baixado com sucesso.')
          "

      - name: Verificar modelo baixado
        run: ls -lh models/bertimbau-bias/

      - name: Rodar pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_pipeline.py
