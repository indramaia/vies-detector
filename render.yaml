services:
  - type: web
    name: vies-detector-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --worker-class gthread --threads 4 api.app:app
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - api/**
        - scripts/setup_db.py
        - aggregation/**
        - ideological/**
        - requirements.txt
        - Procfile
        - render.yaml
      ignoredPaths:
        - "README.md"
        - "docs/**"
        - "*.md"
        - "scripts/generate_spectrum_chart.py"
        - ".github/**"
        - "classifier/**"
        - "collector/**"
        - "pipeline/**"
